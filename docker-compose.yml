networks:
  raspi_network:
    driver: bridge

services:
  pibot:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/vchiq:/dev/vchiq"
      - "/dev/video0:/dev/video0"
    group_add:
      - video
    restart: on-failure
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - BUTTON_DELAY=${BUTTON_DELAY}
      - FLASK_PORT=${FLASK_PORT}
    volumes:
      - .:/app
    networks:
      - raspi_network
    ports:
      - "${FLASK_PORT}:${FLASK_PORT}"
    command: python3 app.py

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: on-failure
    ports:
      - "${PORTAINER_PORT}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - raspi_network

volumes:
  portainer_data:
