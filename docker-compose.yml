services:
  pibot:
    build:
      context: .
      dockerfile: Dockerfile.pibot
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=pibot.py
      - FLASK_PORT=5000
    volumes:
      - .:/app
    command: ["python3", "pibot.py"]

  flask_ui:
    build:
      context: .
      dockerfile: Dockerfile.flask_ui
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - FLASK_PORT=5000
      - BACKEND_HOST=pibot
      - BACKEND_PORT=5001
    volumes:
      - .:/app
    command: ["flask", "run", "--host=0.0.0.0"]
