<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi Robot Control</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, sans-serif;
        }
        button {
            width: 100px;
            height: 50px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            width: 80%;
            height: 200px;
            border: 1px solid #ccc;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<h1>Raspberry Pi Robot Control</h1>

<button onclick="move('forwards')">⬆️ Forward</button><br>
<button onclick="move('left')">⬅️ Left</button>
<button onclick="move('stop')">⏹️ Stop</button>
<button onclick="move('right')">➡️ Right</button><br>
<button onclick="move('backwards')">⬇️ Backward</button>

<div id="output"></div>

<script>
    async function move(direction) {
        const url = `/${direction}`;

        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });

        const data = await response.json();
        logOutput(`${new Date().toLocaleTimeString()}: ${data.message}`);
    }

    function logOutput(message) {
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML += `<div>${message}</div>`;
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    document.addEventListener('keydown', function(event) {
        switch(event.key) {
            case 'w':
                move('forwards');
                break;
            case 'a':
                move('left');
                break;
            case 's':
                move('backwards');
                break;
            case 'd':
                move('right');
                break;
            case ' ':
                move('stop');
                break;
        }
    });
</script>
</body>
</html>
