<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raspberry Pi Robot Control</title>
    <style>
        body {
            text-align: center;
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }

        button {
            width: 100px;
            height: 50px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            width: 100%;
            height: 150px;
            border: 1px solid #ccc;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
        }

        #video {
            width: 100%;
            max-width: 640px;
            height: auto;
            border: 1px solid #ccc;
            margin: 20px auto 0 auto;
            /* Center horizontally */
            display: none;
        }

        #spinner {
            margin: 20px auto 0 auto;
            /* Center horizontally */
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #555;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            button {
                width: 80px;
                height: 40px;
                font-size: 14px;
            }

            #output {
                height: 80px;
            }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .controls-row button {
            flex: 1;
            margin: 5px;
        }

        .mode-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .mode-links a {
            color: #0b5cab;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Pibot Movement Controls</h1>
    <div class="mode-links">
        <a href="/control">Control Mode</a>
        <a href="/independent">Independent Mode</a>
    </div>

    <div id="spinner"></div>
    <img id="video" src="/video_feed" alt="Video feed unavailable">

    <div class="controls">
        <div class="controls-row">
            <button
                onmousedown="handlePress('left')"
                onmouseup="handleRelease()"
                onmouseleave="handleRelease()"
                ontouchstart="handlePress('left')"
                ontouchend="handleRelease()">⬅️ Left</button>
            <button
                onmousedown="handlePress('forwards')"
                onmouseup="handleRelease()"
                onmouseleave="handleRelease()"
                ontouchstart="handlePress('forwards')"
                ontouchend="handleRelease()">⬆️ Forward</button>
            <button
                onmousedown="handlePress('right')"
                onmouseup="handleRelease()"
                onmouseleave="handleRelease()"
                ontouchstart="handlePress('right')"
                ontouchend="handleRelease()">➡️ Right</button>
        </div>
        <div class="controls-row">
            <button
                onmousedown="handlePress('backwards')"
                onmouseup="handleRelease()"
                onmouseleave="handleRelease()"
                ontouchstart="handlePress('backwards')"
                ontouchend="handleRelease()">⬇️ Backward</button>
        </div>
        <div class="controls-row">
            <button onclick="handleRelease()">⏹️ Stop</button>
        </div>
    </div>

    <div id="output"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.min.js"></script>
    <script>
        const socket = io();
        let retryInterval = null;
        let retryActive = false;
        let activeDirection = null;
        const heldKeys = new Set();
        const movementKeys = new Set(['w', 'a', 's', 'd']);
        const video = document.getElementById('video');
        const spinner = document.getElementById('spinner');

        video.addEventListener('load', function () {
            video.style.display = 'block';
            spinner.style.display = 'none';

            if (retryInterval) {
                clearInterval(retryInterval);
                retryInterval = null;
            }

            if (retryActive) {
                retryActive = false;
                logOutput('✅ Video feed restored.');
            }
        });

        video.addEventListener('error', function () {
            if (!retryActive) {
                retryActive = true;
                logOutput('⚠️ Video feed unavailable. Starting retry loop...');
                startRetryLoop();
            }

            video.style.display = 'none';
            spinner.style.display = 'block';
        });

        function mapKeyToDirection(key) {
            switch (key) {
                case 'w': return 'forwards';
                case 'a': return 'left';
                case 's': return 'backwards';
                case 'd': return 'right';
                default: return null;
            }
        }

        function getPriorityDirection() {
            if (heldKeys.has('w')) return 'forwards';
            if (heldKeys.has('s')) return 'backwards';
            if (heldKeys.has('a')) return 'left';
            if (heldKeys.has('d')) return 'right';
            return null;
        }

        function startMove(direction) {
            if (!direction || activeDirection === direction) {
                return;
            }

            activeDirection = direction;
            socket.emit('move_start', { direction }, function (response) {
                if (response && response.message) {
                    logOutput(`${new Date().toLocaleTimeString()}: ${response.message}`);
                }
            });
        }

        function stopMove() {
            if (activeDirection === null) {
                return;
            }

            activeDirection = null;
            socket.emit('stop', function (response) {
                if (response && response.message) {
                    logOutput(`${new Date().toLocaleTimeString()}: ${response.message}`);
                }
            });
        }

        function syncMovementState() {
            const nextDirection = getPriorityDirection();
            if (!nextDirection) {
                stopMove();
                return;
            }

            startMove(nextDirection);
        }

        function handlePress(direction) {
            heldKeys.clear();
            startMove(direction);
        }

        function handleRelease() {
            heldKeys.clear();
            stopMove();
        }

        function logOutput(message) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML += `<div>${message}</div>`;
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function startRetryLoop() {
            retryInterval = setInterval(() => {
                logOutput('🔄 Retrying video connection...');
                video.src = `/video_feed?ts=${Date.now()}`;
                video.style.display = 'none';
                spinner.style.display = 'block';
            }, 3000);

            fetch('/logs')
                .then(res => res.json())
                .then(logs => {
                    logOutput('<strong>Latest server logs:</strong>');
                    logs.forEach(line => logOutput(line));
                })
                .catch(err => {
                    logOutput('Failed to fetch server logs: ' + err);
                });
        }

        document.addEventListener('keydown', function (event) {
            const key = event.key.toLowerCase();

            if (key === ' ') {
                event.preventDefault();
                heldKeys.clear();
                stopMove();
                return;
            }

            if (!movementKeys.has(key) || event.repeat) {
                return;
            }

            event.preventDefault();
            heldKeys.add(key);
            syncMovementState();
        });

        document.addEventListener('keyup', function (event) {
            const key = event.key.toLowerCase();
            if (!movementKeys.has(key)) {
                return;
            }

            event.preventDefault();
            heldKeys.delete(key);
            syncMovementState();
        });

        window.addEventListener('blur', function () {
            heldKeys.clear();
            stopMove();
        });

        window.addEventListener('beforeunload', function () {
            heldKeys.clear();
            stopMove();
        });
    </script>
</body>

</html>
